spring.application.name=Campus Hub
server.port = 8081
server.servlet.context-path= /live-campus-hub

##Data Source Configs
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.url=jdbc:mysql://localhost:3306/live-campus-hub?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC

## Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true # Formats SQL queries for better readability

